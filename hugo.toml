baseURL = "https://你的用户名.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "My Tech Blog"
theme = "hugo-theme-stack"
paginate = 5
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[params]
  mainSections = ["posts"]
  featuredImageField = "image"
  rssFullContent = true

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.sidebar]
    subtitle = "技术探索与安全研究"
    [params.sidebar.avatar]
      enabled = true
      local = true
      src = "img/avatar.png"

  [params.article]
    featuredImage = true
    showDate = true
    showShare = true
    showReadingTime = true
    showTableOfContents = true
    showRelatedContent = true

  [params.article.license]
    enabled = true
    default = "CC BY-NC-SA 4.0"

  [params.widgets]
    enabled = ["search", "categories", "tags", "archives"]

  [params.search]
    enabled = true

  [params.opengraph]
    enabled = true

  [params.comments]
    enabled = false

  [params.colorScheme]
    default = "auto"
    toggle = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 2

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4
